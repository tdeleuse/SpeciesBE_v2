
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeciesBE</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SpeciesBE.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        #app:has(.loading-progress) {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a3d2b 0%, #2d6a4f 50%, #40916c 100%);
            z-index: 9999;
        }

        .loading-progress {
            display: none;
        }

        .loading-progress-text {
            display: none;
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .splash-logo {
            font-size: 4rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .splash-title {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin-top: 1rem;
            letter-spacing: 1px;
        }

        .splash-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .splash-dots {
            display: flex;
            gap: 8px;
            margin-top: 2rem;
        }

            .splash-dots span {
                width: 10px;
                height: 10px;
                background: rgba(255,255,255,0.6);
                border-radius: 50%;
                animation: bounce 1.2s ease-in-out infinite;
            }

                .splash-dots span:nth-child(2) {
                    animation-delay: 0.2s;
                }

                .splash-dots span:nth-child(3) {
                    animation-delay: 0.4s;
                }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            40% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
        <div class="splash-content">
            <div class="splash-logo">🌿</div>
            <div class="splash-title">Species</div>
            <div class="splash-subtitle">Explorez le monde du vivant</div>
            <div class="splash-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
